<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SierpSphere</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; color: #8af; }
  canvas { display: block; }
  #menubar {
    position: fixed; top: 0; left: 0; right: 0; height: 40px; z-index: 20;
    background: rgba(8,8,18,0.95); border-bottom: 1px solid #224;
    display: flex; align-items: center; gap: 4px; padding: 0 12px;
  }
  #menubar .title { color: #adf; font-size: 14px; font-weight: bold; margin-right: 16px; }
  #menubar .sep { width: 1px; height: 20px; background: #224; margin: 0 6px; }
  #preset-btn {
    padding: 4px 10px; background: #1a3a6a; color: #adf;
    border: 1px solid #4a7aba; border-radius: 4px; cursor: pointer;
    font-family: inherit; font-size: 12px;
  }
  #preset-btn:hover { background: #2a5a9a; }
  #preset-dropdown {
    display: none; position: absolute; top: 100%; left: 0; min-width: 220px;
    background: rgba(8,8,18,0.98); border: 1px solid #335; border-radius: 4px;
    z-index: 100; margin-top: 2px; overflow: hidden;
  }
  #preset-dropdown.open { display: block; }
  #preset-dropdown .item {
    padding: 8px 14px; cursor: pointer; font-size: 12px; color: #8af;
    border-bottom: 1px solid #1a2a3a;
  }
  #preset-dropdown .item:last-child { border-bottom: none; }
  #preset-dropdown .item:hover { background: #1a3a6a; color: #adf; }
  #preset-dropdown .item.active { color: #6cf; background: #112a4a; }
  #active-preset { font-size: 12px; color: #6cf; margin-left: 8px; }
  .menu-action {
    padding: 4px 10px; background: transparent; color: #8af;
    border: 1px solid #335; border-radius: 4px; cursor: pointer;
    font-family: inherit; font-size: 12px;
  }
  .menu-action:hover { background: #1a2a3a; color: #adf; }
  #status { margin-left: auto; font-size: 11px; color: #557; }
  #panel {
    position: fixed; top: 48px; right: 12px; z-index: 10;
    background: rgba(8,8,18,0.92); border: 1px solid #224;
    border-radius: 6px; padding: 14px; font-size: 12px; min-width: 220px;
  }
  #panel label { display: block; margin: 8px 0 2px; color: #adf; }
  #panel input[type=range] { width: 100%; accent-color: #4a7aba; }
  #panel .val { float: right; color: #6cf; }
  #panel .section { color: #557; font-size: 10px; margin: 12px 0 4px;
    text-transform: uppercase; letter-spacing: 1px; }
  #panel select {
    width: 100%; background: #112; color: #8af; border: 1px solid #335;
    border-radius: 3px; padding: 3px; font-family: inherit; font-size: 12px;
  }
  #panel .grammar-view {
    margin-top: 10px; font-size: 10px; color: #446; line-height: 1.6;
    max-height: 120px; overflow-y: auto; border-top: 1px solid #1a2a3a; padding-top: 8px;
  }
  #panel .grammar-view .iter-row { display: flex; gap: 6px; align-items: center; }
  #panel .grammar-view .tag { padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: bold; }
  #panel .grammar-view .tag.sub { background: #3a1010; color: #f86; }
  #panel .grammar-view .tag.add { background: #0a2a1a; color: #6f8; }
  #panel .grammar-view .tag.int { background: #1a1a3a; color: #88f; }
  #info { position: fixed; bottom: 12px; left: 12px; font-size: 11px; color: #446; pointer-events: none; }
</style>
</head>
<body>

<div id="menubar">
  <span class="title">SierpSphere</span>
  <div class="sep"></div>
  <div style="position:relative">
    <button id="preset-btn">Presets &#9662;</button>
    <div id="preset-dropdown"></div>
  </div>
  <span id="active-preset">-</span>
  <div class="sep"></div>
  <button class="menu-action" id="btn-apply">Apply custom</button>
  <button class="menu-action" id="btn-mesh">Download GLB</button>
  <button class="menu-action" id="btn-snap">Snapshot HQ</button>
  <span id="status"></span>
</div>

<div id="panel">
  <div class="section">Custom grammar</div>
  <label>Symmetry <span class="val" id="sym-val">tetrahedral</span></label>
  <select id="sym-select">
    <option value="tetrahedral">Tetrahedral (4)</option>
    <option value="octahedral">Octahedral (6)</option>
    <option value="icosahedral">Icosahedral (12)</option>
  </select>
  <label>Iterations <span class="val" id="iter-val">3</span></label>
  <input type="range" id="iter-range" min="1" max="5" value="3" step="1">
  <label>Scale factor <span class="val" id="sf-val">0.50</span></label>
  <input type="range" id="sf-range" min="0.2" max="0.6" value="0.5" step="0.01">
  <label>Mesh resolution <span class="val" id="res-val">64</span></label>
  <input type="range" id="res-range" min="32" max="160" value="64" step="8">
  <div class="section">Active grammar</div>
  <div id="grammar-view" class="grammar-view">-</div>
</div>

<div id="info">Drag to orbit - Scroll to zoom</div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
